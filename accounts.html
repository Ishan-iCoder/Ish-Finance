<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - IshFinance</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 10c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M16 10V9m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans selection:bg-indigo-500/30">

    <div id="sidebar-container"></div>

    <main class="ml-0 sm:ml-64 min-h-screen flex flex-col transition-all duration-300 relative">
        <header class="py-4 sm:h-20 sm:py-0 flex flex-row items-center justify-between px-4 sm:px-8 border-b border-slate-800/50 bg-slate-900/50 backdrop-blur-md sticky top-0 z-30 gap-2 sm:gap-4">
            <div class="flex flex-col min-w-0">
                <h1 class="text-lg sm:text-2xl font-bold text-white tracking-tight truncate">Bank Accounts & Wallets</h1>
                <p class="text-xs sm:text-sm text-slate-400 font-medium mt-1 hidden sm:block md:hidden lg:block truncate">Manage your cash flows and balances</p>
            </div>
            <button onclick="openAccountModal()" class="btn-primary px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-lg shadow-indigo-500/20 text-white flex items-center shrink-0">
                <svg class="w-4 h-4 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden sm:inline">New Account</span>
            </button>
        </header>

        <div class="p-8 flex-1 w-full space-y-6">
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500/10 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>
            
            <div id="accounts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="col-span-full text-center py-10">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mb-4"></div>
                    <p class="text-slate-400">Loading your accounts...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Adding Account -->
    <div id="account-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeAccountModal()"></div>
        <div class="relative bg-slate-800 border border-slate-700/50 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl modal-pop">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white tracking-tight">Add New Account</h3>
                <button onclick="closeAccountModal()" class="text-slate-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="account-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Account Name</label>
                    <input type="text" id="acc-name" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="e.g. Commercial Bank, Cash Wallet">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Account Type</label>
                    <select id="acc-type" class="input-field block w-full px-4 py-3 rounded-xl text-slate-200 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none bg-slate-800/50 border border-slate-700">
                        <option value="bank_account">Bank Account</option>
                        <option value="cash">Cash</option>
                        <option value="credit_card">Credit Card</option>
                        <option value="investment">Investment</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Initial Balance</label>
                    <input type="number" step="0.01" id="acc-balance" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="0.00">
                </div>

                <div class="pt-2">
                    <button type="submit" id="acc-submit" class="w-full btn-primary py-3.5 rounded-xl text-white font-bold shadow-lg flex justify-center items-center">
                        Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app-utils.js"></script>
    <script src="sidebar.js"></script>
    <script>
        let currentUser = null;

        // XSS protection helper
        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.addEventListener('DOMContentLoaded', async () => {
             if(typeof supabaseClient === 'undefined') return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            loadAccounts();
        });

        async function loadAccounts() {
            const grid = document.getElementById('accounts-grid');
            try {
                const { data, error } = await supabaseClient
                    .from('accounts')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Render Add button
                let html = `
                <div onclick="openAccountModal()" class="glass-panel p-6 rounded-3xl flex flex-col items-center justify-center border-2 border-dashed border-slate-700/50 hover:border-indigo-500/50 hover:bg-slate-800/30 transition-colors cursor-pointer min-h-[160px] text-indigo-400 group">
                    <div class="text-center group-hover:scale-105 transition-transform">
                        <svg class="w-10 h-10 mx-auto mb-3 opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span class="font-bold">Add New Account</span>
                    </div>
                </div>`;

                if(data.length === 0) {
                     grid.innerHTML = html;
                     return;
                }

                data.forEach(acc => {
                    const balanceColor = acc.balance < 0 ? 'text-pink-400' : 'text-emerald-400';
                    const icon = acc.type === 'cash' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>' 
                               : acc.type === 'credit_card' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>'
                               : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path>';

                    html += `
                    <div class="glass-panel p-6 rounded-3xl relative group">
                        <button onclick="deleteAccount('${acc.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        <div class="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-xl flex items-center justify-center mb-4 shadow-lg shadow-indigo-500/10">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                ${icon}
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1 uppercase tracking-wider">${escHtml(acc.name)}</h3>
                        <p class="text-xs font-bold text-slate-500 mb-6 uppercase tracking-wider">${acc.type.replace('_', ' ')}</p>
                        
                        <div class="pt-4 border-t border-slate-700/50 flex justify-between items-end">
                            <span class="text-sm font-medium text-slate-400">Current Balance</span>
                            <span class="text-2xl font-extrabold ${balanceColor}">${formatCurrency(acc.balance)}</span>
                        </div>
                    </div>`;
                });

                grid.innerHTML = html;

            } catch (error) {
                console.error("Error loading accounts", error);
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">Error loading accounts. Please refresh.</div>`;
            }
        }

        // Add Logic
        document.getElementById('account-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('acc-submit');
            btn.innerHTML = 'Creating...';
            btn.disabled = true;

            const name = document.getElementById('acc-name').value.trim();
            const type = document.getElementById('acc-type').value;
            const balance = document.getElementById('acc-balance').value;

            if (!name) {
                await customAlert('Account name cannot be empty.');
                btn.innerHTML = 'Create Account'; btn.disabled = false;
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('accounts')
                    .insert([{ 
                        user_id: currentUser.id,
                        name: name,
                        type: type,
                        balance: parseFloat(balance)
                    }]);
                
                if (error) throw error;
                
                closeAccountModal();
                document.getElementById('account-form').reset();
                loadAccounts();

            } catch (error) {
                await customAlert('Failed to save account: ' + error.message);
            } finally {
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        });

        async function deleteAccount(id) {
            const confirmed = await customConfirm("Are you sure? This will delete all transactions associated with this account too!");
            if(!confirmed) return;
            try {
                const { error } = await supabaseClient.from('accounts').delete().eq('id', id);
                if (error) throw error;
                loadAccounts();
            } catch (error) {
                await customAlert("Could not delete account: " + error.message);
            }
        }

        // Modals
        function openAccountModal() {
            document.getElementById('account-modal').classList.remove('hidden');
            document.getElementById('account-modal').classList.add('flex');
        }

        function closeAccountModal() {
            document.getElementById('account-modal').classList.add('hidden');
            document.getElementById('account-modal').classList.remove('flex');
        }
    </script>
</body>
</html>
