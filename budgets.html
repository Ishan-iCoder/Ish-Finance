<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budgets - IshFinance</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 10c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M16 10V9m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans selection:bg-indigo-500/30">

    <div id="sidebar-container"></div>

    <main class="ml-0 sm:ml-64 min-h-screen flex flex-col transition-all duration-300 relative">
        <header class="py-4 sm:h-20 sm:py-0 flex flex-row items-center justify-between px-4 sm:px-8 border-b border-slate-800/50 bg-slate-900/50 backdrop-blur-md sticky top-0 z-30 gap-2 sm:gap-4">
            <div class="flex flex-col min-w-0">
                <h1 class="text-lg sm:text-2xl font-bold text-white tracking-tight truncate">Budgets</h1>
                <p class="text-xs sm:text-sm text-slate-400 font-medium mt-1 hidden sm:block md:hidden lg:block truncate">Keep your spending in check</p>
            </div>
            <button onclick="openBudgetModal()" class="btn-primary px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-lg shadow-indigo-500/20 text-white flex items-center shrink-0">
                <svg class="w-4 h-4 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden sm:inline">Create Budget</span>
            </button>
        </header>

        <div class="p-8 flex-1 w-full space-y-6">
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500/10 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>

            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-white tracking-tight">Active Monthly Budgets</h2>
                <div class="relative w-48">
                    <input type="month" id="budget-period" onchange="loadBudgets()" class="input-field block w-full px-4 py-2 rounded-xl text-sm text-slate-200 bg-slate-800 border border-slate-700 focus:outline-none">
                </div>
            </div>

            <div id="budgets-list" class="space-y-6">
                 <!-- Loading State -->
                 <div class="text-center py-10">
                     <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mb-4"></div>
                     <p class="text-slate-400">Computing spendings...</p>
                 </div>
            </div>
        </div>
    </main>

    <!-- Modal for Adding Budget -->
    <div id="budget-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeBudgetModal()"></div>
        <div class="relative bg-slate-800 border border-slate-700/50 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl modal-pop">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white tracking-tight">Set Budget Limit</h3>
                <button onclick="closeBudgetModal()" class="text-slate-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="budget-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Expense Category</label>
                    <select id="bg-category" required class="input-field block w-full px-4 py-3 rounded-xl text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 bg-slate-800/50 border border-slate-700"></select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Monthly Limit</label>
                    <input type="number" step="0.01" min="0.01" id="bg-amount" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="e.g. 50000">
                </div>

                <div class="pt-2">
                    <button type="submit" id="bg-submit" class="w-full btn-primary py-3.5 rounded-xl text-white font-bold shadow-lg flex justify-center items-center">
                        Set Budget
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app-utils.js"></script>
    <script src="sidebar.js"></script>
    <script>
        let currentUser = null;
        let categoriesData = [];

        // XSS protection helper
        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.addEventListener('DOMContentLoaded', async () => {
             if(typeof supabaseClient === 'undefined') return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            
            // Set current month
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            document.getElementById('budget-period').value = `${yyyy}-${mm}`;

            await fetchDropdownData();
            loadBudgets();
        });

        async function fetchDropdownData() {
            // Fetch ONLY Expense Categories
            const catRes = await supabaseClient.from('categories').select('id, name').eq('type', 'expense').order('name');
            if(catRes.data) categoriesData = catRes.data;

            const catSelect = document.getElementById('bg-category');
            catSelect.innerHTML = categoriesData.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function loadBudgets() {
            const list = document.getElementById('budgets-list');
            const period = document.getElementById('budget-period').value;

            try {
                // Fetch budgets for period
                const bgRes = await supabaseClient
                    .from('budgets')
                    .select('*, categories(name, color)')
                    .eq('period', period)
                    .order('created_at', { ascending: false });

                if (bgRes.error) throw bgRes.error;

                const data = bgRes.data;

                if(data.length === 0) {
                     list.innerHTML = `
                     <div class="glass-panel p-12 rounded-3xl text-center flex flex-col items-center justify-center border-2 border-dashed border-slate-700/50">
                         <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4 text-slate-500 shadow-lg shadow-slate-900/50">
                             <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                         </div>
                         <h3 class="text-lg font-bold text-white mb-2">No Budgets Yet</h3>
                         <p class="text-sm font-medium text-slate-400 mb-6 max-w-sm">Create a budget to monitor your expenses and stay on top of your financial goals.</p>
                         <button onclick="openBudgetModal()" class="btn-primary px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20 text-white">Create First Budget</button>
                     </div>`;
                     return;
                }

                // Fetch transactions for this period to calc exactly what was spent
                const startDate = `${period}-01`;
                // Construct rough boundary
                const endDt = new Date(startDate); endDt.setMonth(endDt.getMonth()+1);
                const endDate = endDt.toISOString().slice(0,10);
                
                const txRes = await supabaseClient.from('transactions').select('category_id, amount')
                    .eq('type', 'expense').gte('date', startDate).lt('date', endDate);

                let spentData = {};
                if(txRes.data) {
                    txRes.data.forEach(tx => {
                        spentData[tx.category_id] = (spentData[tx.category_id] || 0) + Number(tx.amount);
                    });
                }

                // Calculate hex to rgb
                const hexToRgb = hex => {
                    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                    return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '99, 102, 241';
                };

                let html = '';
                data.forEach(bg => {
                    const limit = Number(bg.amount);
                    const spent = spentData[bg.category_id] || 0;
                    let pct = (spent / limit) * 100;
                    
                    const isOver = pct > 100;
                    if(pct > 100) pct = 100; // clamp bar visual

                    const barColor = isOver ? 'from-red-500 to-red-400' : (pct > 80 ? 'from-orange-500 to-orange-400' : 'from-indigo-500 to-blue-500');
                    const textAlert = isOver ? 'text-red-400' : 'text-slate-400';
                    const colorHex = bg.categories?.color || '#3b82f6';
                    const rgb = hexToRgb(colorHex);

                    html += `
                    <div class="glass-panel p-6 rounded-3xl relative group">
                        <button onclick="deleteBudget('${bg.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        <div class="flex justify-between items-center mb-4 pr-10">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-lg flex items-center justify-center font-bold" style="background-color: rgba(${rgb}, 0.2); color: ${colorHex}">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                </div>
                                <span class="font-bold text-white tracking-wide uppercase text-sm">${escHtml(bg.categories?.name || 'Unknown')}</span>
                            </div>
                            <span class="text-sm font-bold text-slate-300">${formatCurrency(spent)} / ${formatCurrency(limit, {noDecimals:true})}</span>
                        </div>
                        <div class="w-full bg-slate-800/80 rounded-full h-3 mb-2 shadow-inner border border-slate-700/50">
                            <div class="bg-gradient-to-r ${barColor} h-3 rounded-full transition-all duration-1000" style="width: ${pct}%"></div>
                        </div>
                        <div class="flex justify-between items-center text-xs font-medium">
                            <span class="${textAlert}">${pct.toFixed(1)}% Used ${isOver ? '(EXCEEDED)' : ''}</span>
                            <span class="text-slate-500">Remaining: ${isOver ? formatCurrency(0) : formatCurrency(limit - spent, {noDecimals:true})}</span>
                        </div>
                    </div>`;
                });

                list.innerHTML = html;

            } catch (error) {
                console.error("Error loading bg", error);
                list.innerHTML = `<div class="text-center py-10 text-red-400">Error loading. Please refresh.</div>`;
            }
        }

        // Add Logic
        document.getElementById('budget-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(categoriesData.length === 0) {
                await customAlert("Please add expense categories first in the Categories page!");
                return;
            }

            const btn = document.getElementById('bg-submit');
            btn.innerHTML = 'Setting...';
            btn.disabled = true;

            const category_id = document.getElementById('bg-category').value;
            const amount = parseFloat(document.getElementById('bg-amount').value);
            const period = document.getElementById('budget-period').value;

            if (!amount || amount <= 0) {
                await customAlert('Please enter a valid budget amount greater than 0.');
                btn.innerHTML = 'Set Budget'; btn.disabled = false;
                return;
            }

            try {
                // Upsert budget for category + period (since unique constraint exists)
                const { error } = await supabaseClient
                    .from('budgets')
                    .upsert([{ 
                        user_id: currentUser.id,
                        category_id: category_id,
                        amount: amount,
                        period: period
                    }], { onConflict: 'user_id, category_id, period' });
                    
                if (error) throw error;
                
                closeBudgetModal();
                document.getElementById('bg-amount').value = '';
                loadBudgets();

            } catch (error) {
                await customAlert('Failed to save budget: ' + error.message);
            } finally {
                btn.innerHTML = 'Set Budget';
                btn.disabled = false;
            }
        });

        async function deleteBudget(id) {
            const confirmed = await customConfirm("Remove this budget limit?");
            if(!confirmed) return;
            try {
                const { error } = await supabaseClient.from('budgets').delete().eq('id', id);
                if (error) throw error;
                loadBudgets();
            } catch (error) {
                await customAlert("Could not remove budget limit: " + error.message);
            }
        }


        // Modals
        async function openBudgetModal() {
            if(categoriesData.length === 0) {
                await customAlert("You need to setup at least one expense category.");
                window.location.href = 'categories.html';
                return;
            }
            document.getElementById('budget-modal').classList.remove('hidden');
            document.getElementById('budget-modal').classList.add('flex');
        }

        function closeBudgetModal() {
            document.getElementById('budget-modal').classList.add('hidden');
            document.getElementById('budget-modal').classList.remove('flex');
        }
    </script>
</body>
</html>
