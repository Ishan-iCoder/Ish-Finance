<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Goals - IshFinance</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 10c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M16 10V9m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans selection:bg-indigo-500/30">

    <div id="sidebar-container"></div>

    <main class="ml-0 sm:ml-64 min-h-screen flex flex-col transition-all duration-300 relative">
        <header class="py-4 sm:h-20 sm:py-0 flex flex-row items-center justify-between px-4 sm:px-8 border-b border-slate-800/50 bg-slate-900/50 backdrop-blur-md sticky top-0 z-30 gap-2 sm:gap-4">
            <div class="flex flex-col min-w-0">
                <h1 class="text-lg sm:text-2xl font-bold text-white tracking-tight truncate">Savings Goals</h1>
                <p class="text-xs sm:text-sm text-slate-400 font-medium mt-1 hidden sm:block md:hidden lg:block truncate">Plan your future</p>
            </div>
            <button onclick="openGoalModal()" class="btn-primary px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-lg shadow-indigo-500/20 text-white flex items-center shrink-0">
                <svg class="w-4 h-4 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden sm:inline">New Goal</span>
            </button>
        </header>

        <div class="p-8 flex-1 w-full space-y-6">
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500/10 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>

            <div id="goals-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="col-span-full text-center py-10">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mb-4"></div>
                    <p class="text-slate-400">Loading goals...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal for Adding Goal -->
    <div id="goal-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeGoalModal()"></div>
        <div class="relative bg-slate-800 border border-slate-700/50 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl modal-pop">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white tracking-tight">New Savings Goal</h3>
                <button onclick="closeGoalModal()" class="text-slate-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="goal-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Goal Name</label>
                    <input type="text" id="sg-name" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="e.g. Dream House, New Car">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Target Amount</label>
                    <input type="number" step="0.01" id="sg-target" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="e.g. 500000">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Target Deadline</label>
                    <input type="date" id="sg-deadline" class="input-field block w-full px-4 py-3 rounded-xl text-slate-200 focus:outline-none bg-slate-800 border border-slate-700">
                </div>

                <div class="pt-2">
                    <button type="submit" id="sg-submit" class="w-full btn-primary py-3.5 rounded-xl text-white font-bold shadow-lg flex justify-center items-center">
                        Set Target
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Funds to Goal -->
    <div id="fund-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeFundModal()"></div>
        <div class="relative bg-slate-800 border border-slate-700/50 rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl modal-pop text-center">
            
            <h3 class="text-xl font-bold text-white tracking-tight mb-2">Fund Savings Goal</h3>
            <p class="text-sm text-slate-400 mb-6" id="fund-goal-name">Adding to Goal</p>
            
            <form id="fund-form" class="space-y-5">
                <input type="hidden" id="fund-goal-id">
                <input type="number" id="fund-current" class="hidden">
                
                <div>
                    <input type="number" step="0.01" id="fund-amount" required class="input-field block w-full px-4 py-3 rounded-xl text-white text-center text-lg placeholder-slate-500 font-bold focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="Amount (Rs)">
                </div>

                <div class="pt-2 flex space-x-3">
                    <button type="button" onclick="closeFundModal()" class="w-full bg-slate-700 hover:bg-slate-600 py-3 rounded-xl text-white font-bold transition-all">
                        Cancel
                    </button>
                    <button type="submit" id="fund-submit" class="w-full btn-primary py-3 rounded-xl text-white font-bold shadow-lg">
                        Add Funds
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app-utils.js"></script>
    <script src="sidebar.js"></script>
    <script>
        let currentUser = null;

        // XSS protection helper
        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.addEventListener('DOMContentLoaded', async () => {
             if(typeof supabaseClient === 'undefined') return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            loadGoals();
        });

        async function loadGoals() {
            const list = document.getElementById('goals-list');

            try {
                // Fetch active goals
                const { data, error } = await supabaseClient
                    .from('savings_goals')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if(data.length === 0) {
                     list.innerHTML = `
                     <div class="col-span-full glass-panel p-12 rounded-3xl text-center flex flex-col items-center justify-center border-2 border-dashed border-slate-700/50">
                        <div class="w-16 h-16 bg-slate-800 rounded-2xl flex items-center justify-center mb-4 text-slate-500 shadow-lg shadow-slate-900/50">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-white mb-2">No Savings Goals</h3>
                        <p class="text-sm font-medium text-slate-400 mb-6 max-w-sm">Set your targets and we will help you track your progress to reach them faster.</p>
                        <button onclick="openGoalModal()" class="btn-primary px-6 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20 text-white">Create First Goal</button>
                    </div>`;
                     return;
                }

                let html = '';
                data.forEach(sg => {
                    const target = Number(sg.target_amount);
                    const current = Number(sg.current_amount);
                    let pct = (current / target) * 100;
                    if(pct > 100) pct = 100;

                    const deadlineText = sg.deadline ? new Date(sg.deadline).toLocaleDateString() : 'No Deadline';
                    const isCompleted = current >= target;

                    html += `
                    <!-- Savings Goal Target -->
                    <div class="glass-panel p-6 rounded-3xl group relative">
                        <button onclick="deleteGoal('${sg.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        
                        <div class="flex justify-between items-start mb-6">
                            <div class="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-xl flex items-center justify-center">
                                ${isCompleted 
                                ? `<svg class="w-6 h-6 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`
                                : `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`}
                            </div>
                            <span class="text-[10px] font-bold text-indigo-300 bg-indigo-500/20 px-3 py-1.5 rounded-full border border-indigo-500/20 uppercase tracking-wider">${deadlineText}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1 tracking-tight capitalize">${escHtml(sg.name)}</h3>
                        <p class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 mb-4 font-mono">${formatCurrency(current)}</p>
                        
                        <div class="w-full bg-slate-800 rounded-full h-2.5 mb-2 shadow-inner border border-slate-700/50">
                            <div class="bg-gradient-to-r ${isCompleted ? 'from-emerald-500 to-emerald-400' : 'from-indigo-500 to-blue-500'} h-2.5 rounded-full relative transition-all duration-1000" style="width: ${pct}%">
                                ${!isCompleted ? '<div class="absolute right-0 top-0 bottom-0 w-2 bg-white/30 rounded-full animate-pulse"></div>' : ''}
                            </div>
                        </div>
                        <div class="flex justify-between text-xs font-bold text-slate-400 mb-5">
                            <span class="${isCompleted ? 'text-emerald-400' : ''}">${pct.toFixed(0)}%</span>
                            <span>Target: ${formatCurrency(target, {noDecimals:true})}</span>
                        </div>
                        
                        ${!isCompleted ? `
                        <button onclick="openFundModal('${sg.id}', '${sg.name.replace(/'/g, "\\'")}', ${current})" class="w-full py-2 bg-slate-800/80 hover:bg-slate-700 text-slate-300 font-bold text-sm rounded-xl border border-slate-700 transition-all flex items-center justify-center space-x-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            <span>Add Funds</span>
                        </button>` : `
                        <button disabled class="w-full py-2 bg-emerald-500/10 text-emerald-400 font-bold text-sm rounded-xl border border-emerald-500/20 flex items-center justify-center space-x-2 opacity-80">
                            <span>Goal Completed 🎉</span>
                        </button>`}
                    </div>`;
                });

                list.innerHTML = html;

            } catch (error) {
                console.error("Error loading bg", error);
                list.innerHTML = `<div class="text-center py-10 text-red-400">Error loading. Please refresh.</div>`;
            }
        }

        // Set Target Logic
        document.getElementById('goal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sg-submit');
            btn.innerHTML = 'Setting...';
            btn.disabled = true;

            const name = document.getElementById('sg-name').value.trim();
            const target = parseFloat(document.getElementById('sg-target').value);
            const deadline = document.getElementById('sg-deadline').value || null;

            if (!name) {
                await customAlert('Goal name is required.');
                btn.innerHTML = 'Set Target'; btn.disabled = false; return;
            }
            if (!target || target <= 0) {
                await customAlert('Please enter a valid target amount greater than 0.');
                btn.innerHTML = 'Set Target'; btn.disabled = false; return;
            }

            try {
                const { error } = await supabaseClient
                    .from('savings_goals')
                    .insert([{ 
                        user_id: currentUser.id,
                        name: name,
                        target_amount: target,
                        deadline: deadline
                    }]);
                    
                if (error) throw error;
                
                closeGoalModal();
                document.getElementById('goal-form').reset();
                loadGoals();

            } catch (error) {
                await customAlert('Failed to save target: ' + error.message);
            } finally {
                btn.innerHTML = 'Set Target';
                btn.disabled = false;
            }
        });

        // Add Funds Logic
        document.getElementById('fund-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('fund-submit');
            btn.innerHTML = 'Adding...';
            btn.disabled = true;

            const id = document.getElementById('fund-goal-id').value;
            const current = parseFloat(document.getElementById('fund-current').value);
            const amtToAdd = parseFloat(document.getElementById('fund-amount').value);

            if (!amtToAdd || amtToAdd <= 0) {
                await customAlert('Please enter a valid amount greater than 0.');
                btn.innerHTML = 'Add Funds'; btn.disabled = false; return;
            }

            try {
                const { error } = await supabaseClient
                    .from('savings_goals')
                    .update({ current_amount: current + amtToAdd })
                    .eq('id', id);
                    
                if (error) throw error;
                
                closeFundModal();
                document.getElementById('fund-form').reset();
                loadGoals();

            } catch (error) {
                await customAlert('Failed to add funds: ' + error.message);
            } finally {
                btn.innerHTML = 'Add Funds';
                btn.disabled = false;
            }
        });

        async function deleteGoal(id) {
            const confirmed = await customConfirm("Remove this savings target? Any tracked funds will just disappear from here.");
            if(!confirmed) return;
            try {
                const { error } = await supabaseClient.from('savings_goals').delete().eq('id', id);
                if (error) throw error;
                loadGoals();
            } catch (error) {
                await customAlert("Could not remove target: " + error.message);
            }
        }


        // Modals
        function openGoalModal() {
            document.getElementById('goal-modal').classList.remove('hidden');
            document.getElementById('goal-modal').classList.add('flex');
        }
        function closeGoalModal() {
            document.getElementById('goal-modal').classList.add('hidden');
            document.getElementById('goal-modal').classList.remove('flex');
        }

        function openFundModal(id, name, currentAmt) {
            document.getElementById('fund-goal-id').value = id;
            document.getElementById('fund-goal-name').innerText = `Funding: ${name}`;
            document.getElementById('fund-current').value = currentAmt;
            document.getElementById('fund-modal').classList.remove('hidden');
            document.getElementById('fund-modal').classList.add('flex');
        }
        function closeFundModal() {
            document.getElementById('fund-modal').classList.add('hidden');
            document.getElementById('fund-modal').classList.remove('flex');
        }
    </script>
</body>
</html>
