<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - IshFinance</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 10c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M16 10V9m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1'/%3E%3C/svg%3E">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    /* Blobs */
    .blob-1 {
      position: fixed; width: 450px; height: 450px; background: #6366f1; border-radius: 50%; filter: blur(100px); bottom: -50px; left: -50px; opacity: 0.4; animation: float 15s infinite alternate; z-index: 0;
    }
    .blob-2 {
      position: fixed; width: 400px; height: 400px; background: #ec4899; border-radius: 50%; filter: blur(100px); top: -50px; right: -50px; opacity: 0.5; animation: float 14s infinite alternate-reverse; z-index: 0;
    }
    @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 80px) scale(1.1); } }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative text-slate-200 p-4">

  <!-- Background Animated Blobs -->
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <!-- Hidden marker for signup script behavior -->
  <input type="hidden" id="is-signup" value="true">

  <!-- Registration Container -->
  <div class="relative z-10 w-full max-w-lg px-6 py-10">
    <div class="glass-panel rounded-3xl p-8 sm:p-10 w-full animate-fade-in-up">
      
      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="text-3xl sm:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-300 mb-2 tracking-tight">Create Account</h2>
        <p class="text-slate-400 text-sm font-medium leading-relaxed">Join IshFinance and manage your wealth</p>
      </div>

      <!-- Error Alert -->
      <div id="error-alert" class="hidden bg-red-500/10 border border-red-500/50 text-red-400 rounded-lg p-4 mb-6 text-sm font-medium flex items-center relative overflow-hidden">
        <div class="absolute left-0 top-0 bottom-0 w-1 bg-red-500"></div>
        <svg class="h-5 w-5 mr-3 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>
        <span id="error-text">Authentication Error</span>
      </div>

      <!-- Form -->
      <form id="auth-form" class="space-y-5">
        
        <!-- Name Row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div class="space-y-1">
            <label for="first-name" class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">First Name</label>
            <div class="relative">
              <input type="text" id="first-name" required class="input-field block w-full px-4 py-3 border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-0 sm:text-sm shadow-inner" placeholder="John">
            </div>
          </div>

          <div class="space-y-1">
            <label for="last-name" class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Last Name</label>
            <div class="relative">
              <input type="text" id="last-name" required class="input-field block w-full px-4 py-3 border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-0 sm:text-sm shadow-inner" placeholder="Doe">
            </div>
          </div>
        </div>

        <div class="space-y-1 pt-2">
          <label for="email" class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-indigo-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" /></svg>
            </div>
            <input type="email" id="email" required class="input-field block w-full pl-11 pr-4 py-3 border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-0 sm:text-sm font-medium" placeholder="john@example.com">
          </div>
        </div>

        <div class="space-y-1">
          <label for="password" class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-pink-400/70" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <input type="password" id="password" required class="input-field block w-full pl-11 pr-4 py-3 border-slate-600 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-0 sm:text-sm" placeholder="At least 6 characters">
          </div>
          <p class="text-[11px] text-slate-500 font-medium ml-1 mt-2">Make sure your password is strong and unique.</p>
        </div>

        <div class="pt-4">
          <button type="submit" id="btn-submit" class="btn-primary w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-indigo-500/30 text-sm font-bold text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-slate-900 overflow-hidden relative">
            <span class="relative z-10">Get Started</span>
            <div class="absolute inset-0 h-full w-full bg-gradient-to-r from-blue-600 to-indigo-600 opacity-0 hover:opacity-100 transition-opacity duration-300"></div>
          </button>
        </div>
      </form>

      <!-- Footer -->
      <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
        <p class="text-sm text-slate-400 font-medium">
          Already have an account? 
          <a href="login.html" class="font-bold text-indigo-400 hover:text-white transition-colors">Sign in here</a>
        </p>
      </div>
      
    </div>
  </div>

  <!-- Success Modal -->
  <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-md"></div>
    
    <!-- Modal Content -->
    <div class="relative bg-slate-800 border border-slate-700/50 rounded-[2rem] p-8 max-w-sm w-full mx-4 shadow-2xl modal-pop">
      <div class="flex flex-col items-center text-center">
        <!-- Animated Check Icon -->
        <div class="w-20 h-20 bg-emerald-500/20 rounded-full flex items-center justify-center mb-5 relative">
          <div class="absolute inset-0 bg-emerald-500/20 rounded-full animate-ping opacity-75"></div>
          <svg class="w-10 h-10 text-emerald-400 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        
        <h3 class="text-3xl font-extrabold text-white mb-2 tracking-tight">Success!</h3>
        <p class="text-slate-300 font-medium mb-8 text-sm leading-relaxed">Your account has been crafted beautifully. Welcome aboard to IshFinance!</p>
        
        <button id="btn-modal-close" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-lg shadow-emerald-500/30">
          Proceed to Login
        </button>
      </div>
    </div>
  </div>

  <!-- Core Scripts -->
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
</body>
</html>
