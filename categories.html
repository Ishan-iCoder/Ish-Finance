<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - IshFinance</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%236366f1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none' d='M16 10c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M16 10V9m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .icon-circle { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
        .color-picker-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-picker-opt:hover { transform: scale(1.1); }
        .color-picker-opt.selected { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,0.5); }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans selection:bg-indigo-500/30">

    <div id="sidebar-container"></div>

    <main class="ml-0 sm:ml-64 min-h-screen flex flex-col transition-all duration-300 relative">
        <header class="py-4 sm:h-20 sm:py-0 flex flex-row items-center justify-between px-4 sm:px-8 border-b border-slate-800/50 bg-slate-900/50 backdrop-blur-md sticky top-0 z-30 gap-2 sm:gap-4">
            <div class="flex flex-col min-w-0">
                <h1 class="text-lg sm:text-2xl font-bold text-white tracking-tight truncate">Categories</h1>
                <p class="text-xs sm:text-sm text-slate-400 font-medium mt-1 hidden sm:block md:hidden lg:block truncate">Organize your finances</p>
            </div>
            <button onclick="openCategoryModal()" class="btn-primary px-3 sm:px-4 py-2 rounded-xl text-xs sm:text-sm font-bold shadow-lg shadow-indigo-500/20 text-white flex items-center shrink-0">
                <svg class="w-4 h-4 sm:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden sm:inline">New Category</span>
            </button>
        </header>

        <div class="p-8 flex-1 w-full space-y-6">
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-500/10 rounded-full filter blur-[100px] -z-10 pointer-events-none"></div>

            <div id="categories-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                 <!-- Loading State -->
                 <div class="col-span-full text-center py-10">
                     <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500 mb-4"></div>
                     <p class="text-slate-400">Loading categories...</p>
                 </div>
            </div>
        </div>
    </main>

    <!-- Modal for Adding Category -->
    <div id="category-modal" class="fixed inset-0 z-50 hidden items-center justify-center">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeCategoryModal()"></div>
        <div class="relative bg-slate-800 border border-slate-700/50 rounded-3xl p-8 max-w-md w-full mx-4 shadow-2xl modal-pop">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-white tracking-tight">Add New Category</h3>
                <button onclick="closeCategoryModal()" class="text-slate-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="category-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Category Name</label>
                    <input type="text" id="cat-name" required class="input-field block w-full px-4 py-3 rounded-xl text-white placeholder-slate-500 font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500/50" placeholder="e.g. Freelance, Subscriptions">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Type</label>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="cat-type" value="expense" class="peer sr-only" checked>
                            <div class="text-center px-4 py-3 rounded-xl border border-slate-600 font-medium text-slate-300 peer-checked:bg-pink-500/20 peer-checked:border-pink-500/50 peer-checked:text-pink-400 transition-all">Expense</div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="cat-type" value="income" class="peer sr-only">
                            <div class="text-center px-4 py-3 rounded-xl border border-slate-600 font-medium text-slate-300 peer-checked:bg-emerald-500/20 peer-checked:border-emerald-500/50 peer-checked:text-emerald-400 transition-all">Income</div>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-2">Display Color</label>
                    <div class="flex space-x-3" id="color-picker-container">
                        <div class="color-picker-opt selected" style="background-color: #F44336;" data-color="#F44336" onclick="selectColor(this)"></div>
                        <div class="color-picker-opt" style="background-color: #2196F3;" data-color="#2196F3" onclick="selectColor(this)"></div>
                        <div class="color-picker-opt" style="background-color: #4CAF50;" data-color="#4CAF50" onclick="selectColor(this)"></div>
                        <div class="color-picker-opt" style="background-color: #FF9800;" data-color="#FF9800" onclick="selectColor(this)"></div>
                        <div class="color-picker-opt" style="background-color: #9C27B0;" data-color="#9C27B0" onclick="selectColor(this)"></div>
                        <div class="color-picker-opt" style="background-color: #00BCD4;" data-color="#00BCD4" onclick="selectColor(this)"></div>
                    </div>
                    <input type="hidden" id="cat-color" value="#F44336">
                </div>

                <div class="pt-2">
                    <button type="submit" id="cat-submit" class="w-full btn-primary py-3.5 rounded-xl text-white font-bold shadow-lg flex justify-center items-center">
                        Save Category
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="app-utils.js"></script>
    <script src="sidebar.js"></script>
    <script>
        let currentUser = null;

        // XSS protection helper
        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.addEventListener('DOMContentLoaded', async () => {
             if(typeof supabaseClient === 'undefined') return;
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;
            loadCategories();
        });

        async function loadCategories() {
            const grid = document.getElementById('categories-grid');
            try {
                // Fetch categories
                const { data, error } = await supabaseClient
                    .from('categories')
                    .select('*')
                    .order('type', { ascending: true })
                    .order('name', { ascending: true });

                if (error) throw error;

                grid.innerHTML = ''; // Clear loading

                // Render Add button
                let html = `
                <div onclick="openCategoryModal()" class="glass-panel p-6 rounded-2xl flex items-center justify-center border-2 border-dashed border-slate-700/50 hover:border-indigo-500/50 hover:bg-slate-800/30 transition-colors cursor-pointer min-h-[104px] text-indigo-400 group">
                    <div class="text-center group-hover:scale-105 transition-transform">
                        <svg class="w-8 h-8 mx-auto mb-2 opacity-50 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        <span class="font-bold text-sm">Add New Category</span>
                    </div>
                </div>`;

                // Calculate hex to rgba for backgrounds
                const hexToRgb = hex => {
                    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                    return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '99, 102, 241';
                };

                data.forEach(cat => {
                    const isIncome = cat.type === 'income';
                    const rgb = hexToRgb(cat.color || '#6366f1');
                    const bgStyle = `background-color: rgba(${rgb}, 0.15); color: ${cat.color || '#fff'}`;
                    const borderStyle = `border: 1px solid rgba(${rgb}, 0.2)`;
                    const typeBadge = isIncome 
                        ? `<span class="text-[10px] uppercase tracking-wider font-bold bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full border border-emerald-500/20">Income</span>`
                        : `<span class="text-[10px] uppercase tracking-wider font-bold bg-pink-500/10 text-pink-400 px-2 py-0.5 rounded-full border border-pink-500/20">Expense</span>`;
                    
                    const deleteBtn = cat.user_id ? 
                        `<button onclick="deleteCategory('${cat.id}')" class="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>` : '';

                    html += `
                    <div class="glass-panel p-6 rounded-2xl flex items-center space-x-4 relative group">
                        ${deleteBtn}
                        <div class="icon-circle" style="${bgStyle}">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                        </div>
                        <div>
                            <h3 class="font-bold text-white leading-tight capitalize">${escHtml(cat.name)}</h3>
                            <div class="mt-1">${typeBadge}</div>
                        </div>
                    </div>`;
                });

                grid.innerHTML = html;

            } catch (error) {
                console.error("Error loading categories", error);
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">Error loading categories. Please refresh.</div>`;
            }
        }

        // Add Category Logic
        document.getElementById('category-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('cat-submit');
            btn.innerHTML = 'Saving...';
            btn.disabled = true;

            const name = document.getElementById('cat-name').value.trim();
            if (!name) {
                await customAlert('Category name is required.');
                btn.innerHTML = 'Save Category'; btn.disabled = false;
                return;
            }
            const type = document.querySelector('input[name="cat-type"]:checked').value;
            const color = document.getElementById('cat-color').value;

            try {
                const { error } = await supabaseClient
                    .from('categories')
                    .insert([{ 
                        user_id: currentUser.id,
                        name: name,
                        type: type,
                        color: color,
                        icon: 'tag' // default icon
                    }]);
                
                if (error) throw error;
                
                // Cleanup and reload
                closeCategoryModal();
                document.getElementById('category-form').reset();
                loadCategories();

            } catch (error) {
                await customAlert('Failed to save category: ' + error.message);
            } finally {
                btn.innerHTML = 'Save Category';
                btn.disabled = false;
            }
        });

        async function deleteCategory(id) {
            const confirmed = await customConfirm("Are you sure you want to delete this category?");
            if(!confirmed) return;
            try {
                const { error } = await supabaseClient.from('categories').delete().eq('id', id);
                if (error) throw error;
                loadCategories();
            } catch (error) {
                await customAlert("Could not delete category: " + error.message);
            }
        }

        // UI Helpers
        function openCategoryModal() {
            const modal = document.getElementById('category-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeCategoryModal() {
            const modal = document.getElementById('category-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function selectColor(element) {
            document.querySelectorAll('.color-picker-opt').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('cat-color').value = element.getAttribute('data-color');
        }
    </script>
</body>
</html>
